name: Mark Stale Issues

on:
  schedule:
    - cron: '10 0 * * *'
  workflow_dispatch:

jobs:
  mark-stale:
    name: Mark Stale Issues
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app_id: ${{ secrets.STALE_BOT_APP_ID }}
          private_key: ${{ secrets.STALE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Mark stale issues via GraphQL
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          ORG_NAME: ${{ github.repository_owner }}
          # Update with your organization's project number (the number in the project URL)
          PROJECT_NUMBER: ${{ vars.ROADMAP_PROJECT_NUMBER }}
          # Must match the name of the status option in your project exactly (case-sensitive)
          STALE_STATUS_OPTION: "Stale"
          STALE_DAYS: ${{ vars.STALE_THRESHOLD_DAYS }}
          STALE_LABEL: stale
        run: |
          set -euo pipefail

          STALE_THRESHOLD=$(date -u -d "${STALE_DAYS} days ago" +"%Y-%m-%dT%H:%M:%SZ")
          echo "Marking issues not updated since: ${STALE_THRESHOLD}"

          # ----------------------------------------------------------------
          # Resolve project metadata once up front:
          #   PROJECT_ID       — the project's global node ID, required by
          #                      the updateProjectV2ItemFieldValue mutation
          #   STATUS_FIELD_ID  — the node ID of the "Status" single-select field
          #   STALE_OPTION_ID  — the ID of the "Stale" option within that field
          #
          # These IDs are stable and will not change between runs, so we only
          # need to fetch them once per workflow execution.
          # ----------------------------------------------------------------
          PROJECT_META=$(gh api graphql -f query="
            query(\$org: String!, \$projectNumber: Int!) {
              organization(login: \$org) {
                projectV2(number: \$projectNumber) {
                  id
                  fields(first: 50) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          " -f org="${ORG_NAME}" -F projectNumber="${PROJECT_NUMBER}")

          PROJECT_ID=$(echo "$PROJECT_META" | jq -r '.data.organization.projectV2.id')

          STATUS_FIELD_ID=$(echo "$PROJECT_META" | jq -r '
            .data.organization.projectV2.fields.nodes[]
            | select(.name == "Status")
            | .id
          ')

          STALE_OPTION_ID=$(echo "$PROJECT_META" | jq -r \
            --arg option "$STALE_STATUS_OPTION" '
            .data.organization.projectV2.fields.nodes[]
            | select(.name == "Status")
            | .options[]
            | select(.name == $option)
            | .id
          ')

          if [ -z "$PROJECT_ID" ] || [ -z "$STATUS_FIELD_ID" ] || [ -z "$STALE_OPTION_ID" ]; then
            echo "ERROR: Could not resolve project metadata."
            echo "  PROJECT_ID=${PROJECT_ID}"
            echo "  STATUS_FIELD_ID=${STATUS_FIELD_ID}"
            echo "  STALE_OPTION_ID=${STALE_OPTION_ID}"
            echo "Check that the project number is correct and that a Status field"
            echo "with a '${STALE_STATUS_OPTION}' option exists in the project."
            exit 1
          fi

          echo "Resolved project metadata:"
          echo "  PROJECT_ID=${PROJECT_ID}"
          echo "  STATUS_FIELD_ID=${STATUS_FIELD_ID}"
          echo "  STALE_OPTION_ID=${STALE_OPTION_ID}"

          # ----------------------------------------------------------------
          # Fetch all project items via GraphQL with pagination.
          # We request the fields we need to determine staleness in one query:
          #   - issue number, title, url, updatedAt
          #   - assignees (to filter only assigned issues)
          #   - labels (to skip already-stale issues)
          #   - the repository owner/name (to apply labels via REST)
          # We also request the project item's own node ID so we can pass it
          # to the updateProjectV2ItemFieldValue mutation below.
          # ----------------------------------------------------------------
          CURSOR=""
          HAS_NEXT_PAGE=true

          while [ "$HAS_NEXT_PAGE" = "true" ]; do

            if [ -z "$CURSOR" ]; then
              AFTER_ARG="null"
            else
              AFTER_ARG="\"${CURSOR}\""
            fi

            RESPONSE=$(gh api graphql -f query="
              query(\$org: String!, \$projectNumber: Int!) {
                organization(login: \$org) {
                  projectV2(number: \$projectNumber) {
                    items(first: 100, after: ${AFTER_ARG}) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                            title
                            url
                            updatedAt
                            state
                            repository {
                              name
                              owner {
                                login
                              }
                            }
                            assignees(first: 10) {
                              nodes {
                                login
                              }
                            }
                            labels(first: 20) {
                              nodes {
                                name
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            " -f org="${ORG_NAME}" -F projectNumber="${PROJECT_NUMBER}")

            HAS_NEXT_PAGE=$(echo "$RESPONSE" | jq -r '.data.organization.projectV2.items.pageInfo.hasNextPage')
            CURSOR=$(echo "$RESPONSE" | jq -r '.data.organization.projectV2.items.pageInfo.endCursor')

            # Process each item in the current page.
            # We pipe the full node (including the project item `id`) alongside
            # the issue content so both are available inside the loop.
            echo "$RESPONSE" | jq -c '
              .data.organization.projectV2.items.nodes[]
              | select(.content | type == "object")   # skip drafts / non-issues
              | { itemId: .id, issue: .content }
              | select(.issue.state == "OPEN")
            ' | while IFS= read -r row; do

              ITEM_ID=$(echo "$row"      | jq -r '.itemId')
              issue=$(echo "$row"        | jq -c '.issue')

              ISSUE_NUMBER=$(echo "$issue" | jq -r '.number')
              UPDATED_AT=$(echo "$issue"   | jq -r '.updatedAt')
              REPO_OWNER=$(echo "$issue"   | jq -r '.repository.owner.login')
              REPO_NAME=$(echo "$issue"    | jq -r '.repository.name')
              ASSIGNEE_COUNT=$(echo "$issue" | jq '.assignees.nodes | length')
              ALREADY_STALE=$(echo "$issue" | jq -r --arg label "$STALE_LABEL" \
                '.labels.nodes[].name | select(. == $label)' | wc -l)
              ASSIGNEE_LOGINS=$(echo "$issue" | jq -r '.assignees.nodes[].login' \
                | sed 's/^/@/' | paste -sd ', ')

              # Skip if no assignee
              if [ "$ASSIGNEE_COUNT" -eq 0 ]; then
                continue
              fi

              # Skip if already marked stale
              if [ "$ALREADY_STALE" -gt 0 ]; then
                continue
              fi

              # Skip if updated within the threshold
              if [[ "$UPDATED_AT" > "$STALE_THRESHOLD" ]]; then
                continue
              fi

              echo "Marking stale: ${REPO_OWNER}/${REPO_NAME}#${ISSUE_NUMBER} (last updated: ${UPDATED_AT})"

              # Post a comment notifying the assignee(s)
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                "/repos/${REPO_OWNER}/${REPO_NAME}/issues/${ISSUE_NUMBER}/comments" \
                -f body="👋 Hi ${ASSIGNEE_LOGINS} — this issue has been marked as **stale** because it has had no activity for ${STALE_DAYS} days." > /dev/null

              # Update the project Status field to the "Stale" option via GraphQL mutation.
              # This requires the project item's own node ID (ITEM_ID), not the issue ID.
              gh api graphql -f query="
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: \"${PROJECT_ID}\"
                    itemId: \"${ITEM_ID}\"
                    fieldId: \"${STATUS_FIELD_ID}\"
                    value: { singleSelectOptionId: \"${STALE_OPTION_ID}\" }
                  }) {
                    projectV2Item {
                      id
                    }
                  }
                }
              " > /dev/null

              # Apply the stale label via REST
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                "/repos/${REPO_OWNER}/${REPO_NAME}/issues/${ISSUE_NUMBER}/labels" \
                -f "labels[]=${STALE_LABEL}" > /dev/null

            done

          done

          echo "Done."
